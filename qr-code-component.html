<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <title>Frontend Mentor | QR code component</title>
    <link rel="stylesheet" href="reset.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Variables */
      :root {
        --color-slate-900: #1f314f;
        --color-slate-500: #68778d;
        --color-slate-300: #d5e1ef;
        --color-white: #ffffff;
        --space-500: 2.5rem;
        --space-300: 1.5rem;
        --space-200: 1rem;
        --drop-shadow: 0 25px 25px hsla(0, 0%, 0%, 0.0477);
      }

      /* Global styles */
      body {
        background: var(--color-slate-300);
        color: var(--color-slate-900);
        display: flex;
        flex-direction: column;
        font-family: "Outfit", sans-serif;
        font-size: 0.9375rem;
        letter-spacing: 0.2px;
        line-height: 1.4;
      }

      h2 {
        font-size: 1.375rem;
        letter-spacing: 0;
        line-height: 1.2;
      }

      a {
        color: currentColor;
      }

      a:hover {
        text-decoration: none;
      }

      :focus {
        outline: none;
      }

      :focus-visible {
        outline-offset: 0.3ch;
        outline: 2px solid;
      }

      main {
        display: flex;
        flex: auto;
      }

      /* Utilities */
      .visually-hidden {
        block-size: 1px;
        clip-path: inset(50%);
        inline-size: 1px;
        overflow: hidden;
        position: absolute;
        white-space: nowrap;
      }

      /* Blocks */
      .card {
        background: var(--color-white);
        border-radius: 20px;
        box-shadow: var(--drop-shadow);
        margin: auto;
        max-inline-size: 320px;
        padding: var(--space-200);
        padding-block-end: var(--space-500);
      }

      .card .text {
        margin-block-start: var(--space-300);
        padding-inline: var(--space-200);
        text-align: center;
      }

      .card p {
        color: var(--color-slate-500);
        margin-block-start: var(--space-200);
      }

      .card .img img {
        border-radius: 10px;
      }

      .site-foot {
        padding: 1rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1 class="visually-hidden">QR code component</h1>
      <article class="card">
        <div class="img">
          <img
            src="assets/images/image-qr-code.png"
            alt="QR code to Frontend Mentor website"
          />
        </div>
        <div class="text">
          <h2>Improve your front-end skills by building projects</h2>
          <p>
            Scan the QR code to
            <a href="https://www.frontendmentor.io">visit Frontend Mentor</a>
            and take your coding skills to the next level
          </p>
        </div>
      </article>
    </main>
    <footer class="site-foot">
      <p>
        Challenge by
        <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
          >Frontend Mentor</a
        >. Coded by Jasper.
      </p>
    </footer>
  </body>
</html>
