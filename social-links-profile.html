<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <title>Frontend Mentor | Social links profile</title>
    <link rel="stylesheet" href="reset.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Variables */
      :root {
        --color-grey-900: #141414;
        --color-grey-800: #1f1f1f;
        --color-grey-700: #333333;
        --color-green: #c4f82a;
        --color-white: #ffffff;
        --space-500: 2.5rem;
        --space-300: 1.5rem;
        --space-200: 1rem;
        --space-150: 0.75rem;
        --space-100: 0.5rem;
        --space-50: 0.25rem;
        --fluid-0-40: clamp(0rem, -2.3855rem + 10.1781vw, 2.5rem);
        --fluid-24-40: clamp(1.5rem, 0.5458rem + 4.0712vw, 2.5rem);
      }

      /* Global styles */
      body {
        background: var(--color-grey-900);
        color: var(--color-white);
        display: grid;
        font-family: "Inter", sans-serif;
        font-size: 0.875rem;
        grid-template-rows: 1fr auto;
      }

      h2 {
        font-size: 1.5rem;
      }

      a {
        color: currentColor;
      }

      a:hover {
        text-decoration: none;
      }

      :focus {
        outline: none;
      }

      :focus-visible {
        outline-offset: 0.3ch;
        outline: 2px solid;
      }

      main {
        display: grid;
        padding-block: var(--fluid-0-40);
        padding-inline: var(--fluid-24-40);
        place-items: center;
      }

      /* Utilities */
      .visually-hidden {
        block-size: 1px;
        clip-path: inset(50%);
        inline-size: 1px;
        overflow: hidden;
        position: absolute;
        white-space: nowrap;
      }

      /* Blocks */
      .card {
        background: var(--color-grey-800);
        border-radius: 12px;
        inline-size: min(456px, 100%);
        padding: var(--fluid-24-40);
        text-align: center;
      }

      .card .text {
        margin-block-start: var(--space-300);
      }

      .card .img img {
        border-radius: 100%;
        margin-inline: auto;
      }

      .card .text > :nth-last-child(3) {
        color: var(--color-green);
        font-weight: 700;
        margin-block-start: var(--space-50);
      }

      .card .text > :nth-last-child(2) {
        margin-block-start: var(--space-300);
      }

      .navigation {
        margin-block-start: var(--space-300);
        padding: 0;
      }

      .navigation li {
        margin-block-start: var(--space-200);
      }

      .navigation a {
        align-items: center;
        background: var(--color-grey-700);
        border-radius: 8px;
        display: inline-flex;
        font-weight: 700;
        inline-size: 100%;
        justify-content: center;
        min-block-size: 44px;
        min-inline-size: 10ch;
        padding: var(--space-150);
        text-align: center;
        text-decoration: none;
        transition: 220ms all ease-in-out;
      }

      .navigation a:where(:hover, :focus) {
        background: var(--color-green);
        color: var(--color-grey-700);
      }

      .navigation a:active {
        transform: scale(99%);
      }

      .site-foot {
        padding: 1rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1 class="visually-hidden">Social links profile</h1>
      <div class="card">
        <div class="img">
          <img
            src="assets/images/avatar-jessica.jpeg"
            alt="Jessica Randall's avatar"
            width="88"
            height="88"
          />
        </div>
        <div class="text">
          <h2>Jessica Randall</h2>
          <p>London, United Kingdom</p>
          <p>"Front-end developer and avid reader."</p>
          <nav>
            <ul class="navigation">
              <li><a href="#">GitHub</a></li>
              <li>
                <a href="https://www.frontendmentor.io">Frontend Mentor</a>
              </li>
              <li><a href="#">LinkedIn</a></li>
              <li><a href="#">Twitter</a></li>
              <li><a href="#">Instagram</a></li>
            </ul>
          </nav>
        </div>
      </div>
    </main>
    <footer class="site-foot">
      <p>
        Challenge by
        <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
          >Frontend Mentor</a
        >. Coded by Jasper.
      </p>
    </footer>
  </body>
</html>
